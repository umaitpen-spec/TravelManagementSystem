<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Trip - Roamly</title>
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --primary-solid: #667eea;
      --card-bg: rgba(255, 255, 255, 0.98);
      --input-bg: #f8fafc;
      --input-border: #e2e8f0;
      --sidebar-bg: #1e293b;
      --sidebar-active: rgba(255, 255, 255, 0.1);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      background: var(--primary-gradient) !important;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 15px rgba(102, 126, 234, 0.3);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar-brand {
      color: white !important;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .welcome-text {
      color: rgba(255, 255, 255, 0.95);
      font-weight: 500;
    }

    .btn-signout {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      transition: all 0.3s ease;
    }

    .btn-signout:hover {
      background: rgba(255, 255, 255, 0.25);
      color: white;
    }

    /* Layout */
    .page-wrapper {
      display: flex;
      min-height: calc(100vh - 70px);
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      padding: 2rem 0;
      position: fixed;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }

    .sidebar-brand {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 1rem;
    }

    .sidebar-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-nav li {
      margin: 0.25rem 0;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .sidebar-nav a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .sidebar-nav a.active {
      background: var(--sidebar-active);
      color: white;
      border-left: 3px solid #667eea;
    }

    .sidebar-nav a i {
      font-size: 1.1rem;
      width: 20px;
      text-align: center;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    .content-inner {
      width: 100%;
      max-width: 700px;
      animation: fadeInUp 0.5s ease-out;
    }

    /* Page Header */
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem;
      background: var(--primary-gradient);
      border-radius: 20px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      top: -80px;
      right: -60px;
    }

    .page-header::after {
      content: '✈️';
      position: absolute;
      font-size: 8rem;
      opacity: 0.1;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      position: relative;
    }

    .page-header p {
      font-size: 1rem;
      opacity: 0.9;
      position: relative;
    }

    /* Form Card */
    .form-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .form-card h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--input-border);
    }

    /* Form Styles */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .form-control {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      font-size: 0.95rem;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-solid);
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .form-control:focus ~ .input-icon {
      color: var(--primary-solid);
    }

    /* Number input spinners */
    input[type="number"] {
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Submit Button */
    .btn-submit {
      background: var(--primary-gradient);
      border: none;
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -5px rgba(102, 126, 234, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit i {
      font-size: 1.2rem;
    }

    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--primary-solid);
    }

    /* Responsive */
    @media (max-width: 968px) {
      .sidebar {
        display: none;
      }

      .main-content {
        margin-left: 0;
        padding: 1.5rem;
      }
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .form-card {
        padding: 1.5rem;
      }

      .page-header {
        padding: 1.5rem;
      }

      .page-header h1 {
        font-size: 1.5rem;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-brand" href="/">Roamly</a>
  <div class="ml-auto d-flex align-items-center">
    <span class="welcome-text mr-3" th:text="${userName != null} ? ('Welcome, ' + ${userName}) : ''"></span>
    <form method="post" action="/logout" class="mb-0">
      <button type="submit" class="btn btn-signout btn-sm">Sign Out</button>
    </form>
  </div>
</nav>

<div class="page-wrapper">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">✈️ Roamly</div>
    <ul class="sidebar-nav">
      <li>
        <a href="/">
          <i class="bi bi-house"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a href="/trips/new" class="active">
          <i class="bi bi-plus-circle"></i>
          <span>Create Trip</span>
        </a>
      </li>
      <li>
        <a href="/my-bookings">
          <i class="bi bi-calendar-check"></i>
          <span>My Bookings</span>
        </a>
      </li>
      <li>
        <a href="/expenses">
          <i class="bi bi-wallet2"></i>
          <span>Expenses</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-inner">
      <!-- Page Header -->
      <div class="page-header">
        <h1>✈️ Create Your Next Adventure</h1>
        <p>Plan your dream journey effortlessly.</p>
      </div>

      <!-- Form Card -->
      <div class="form-card">
        <a href="/" class="back-link">
          <i class="bi bi-arrow-left"></i>
          <span>Back to Dashboard</span>
        </a>

        <h3>📝 Trip Details</h3>

        <form id="tripForm" method="post" action="/trips">
          <div class="form-row">
            <div class="form-group">
              <label>Trip Title</label>
              <div class="input-wrapper">
                <input type="text" class="form-control" id="title" name="title" placeholder="Weekend getaway" required>
                <i class="bi bi-compass input-icon"></i>
              </div>
            </div>
            <div class="form-group">
              <label>Destination</label>
              <div class="input-wrapper">
                <input type="text" class="form-control" id="destination" name="destination" placeholder="Goa" required>
                <i class="bi bi-geo-alt input-icon"></i>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Start Date</label>
              <div class="input-wrapper">
                <input type="date" class="form-control" id="startDate" name="startDate" required>
                <i class="bi bi-calendar-event input-icon"></i>
              </div>
            </div>
            <div class="form-group">
              <label>End Date</label>
              <div class="input-wrapper">
                <input type="date" class="form-control" id="endDate" name="endDate" required>
                <i class="bi bi-calendar-check input-icon"></i>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Travelers</label>
              <div class="input-wrapper">
                <input type="number" class="form-control" id="travelers" name="travelers" min="1" value="2" required>
                <i class="bi bi-people input-icon"></i>
              </div>
            </div>
            <div class="form-group">
              <label>Budget (INR)</label>
              <div class="input-wrapper">
                <input type="number" class="form-control" id="budget" name="budget" placeholder="50000" required>
                <i class="bi bi-currency-rupee input-icon"></i>
              </div>
            </div>
          </div>

          <button class="btn-submit" type="submit">
            <i class="bi bi-airplane"></i>
            <span>Create Trip</span>
          </button>
        </form>
      </div>
    </div>
  </main>
</div>
</body>
</html>
