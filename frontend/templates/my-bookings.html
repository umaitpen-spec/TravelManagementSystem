<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Bookings - Roamly</title>
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/customer-layout.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
      --radius-lg: 16px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .navbar {
      background: var(--primary-gradient) !important;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 15px rgba(102, 126, 234, 0.3);
    }
    .navbar-brand { color: white !important; font-weight: 700; font-size: 1.5rem; }
    .welcome-text { color: rgba(255,255,255,0.95); font-weight: 500; }
    .btn-signout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 0.4rem 1rem; border-radius: 30px; transition: var(--transition);
    }
    .btn-signout:hover { background: rgba(255,255,255,0.25); color: white; }

    .sidebar {
      position: fixed;
      left: 0;
      top: 70px;
      width: 260px;
      height: calc(100vh - 70px);
      background: #1e293b;
      padding: 2rem 0;
      z-index: 100;
    }
    .sidebar-brand {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-nav li { margin: 0.25rem 0; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    .sidebar-nav a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }
    .sidebar-nav a.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-left: 3px solid #667eea;
    }
    .sidebar-nav a i { font-size: 1.1rem; width: 20px; text-align: center; }
    .main-content { padding: 2rem 2rem 2rem 280px; max-width: 1400px; margin: 0 auto; }

    .dashboard-header {
      background: var(--primary-gradient);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      margin-bottom: 2rem;
      color: white;
    }
    .header-title { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }

    .booking-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }
    .booking-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-hover); }

    .booking-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .booking-status {
      display: inline-flex;
      align-items: center;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .status-confirmed { background: #d1fae5; color: #065f46; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    .status-completed { background: #dbeafe; color: #1e40af; }

    .booking-ref { font-size: 0.8rem; color: #6b7280; font-family: monospace; }

    .booking-detail { font-size: 0.9rem; color: #6b7280; margin-bottom: 0.25rem; }

    .booking-price { font-size: 1.3rem; font-weight: 700; color: #667eea; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: #9ca3af; }
    .empty-state i { font-size: 4rem; color: #d1d5db; margin-bottom: 1rem; }

    .nav-tabs .nav-link { color: #6b7280; border: none; border-bottom: 2px solid transparent; }
    .nav-tabs .nav-link.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .booking-card { animation: fadeInUp 0.4s ease-out; }
  </style>
</head>
<body>
<nav class="customer-navbar">
  <div class="d-flex justify-content-between align-items-center w-100">
    <a class="navbar-brand" href="/">Roamly</a>
    <div class="d-flex align-items-center">
      <span class="navbar-text mr-3" th:text="${userName != null} ? ${userName} : ''">User</span>
      <form method="post" th:action="@{/logout}">
        <button type="submit" class="btn btn-signout">Sign Out</button>
      </form>
    </div>
  </div>
</nav>

<div th:replace="fragments/customer-sidebar :: sidebar('bookings')"></div>

<div class="customer-main-content">
  <div class="content-wrapper">
    <div class="dashboard-header">
      <h1 class="header-title"><i class="bi bi-calendar-check"></i> My Bookings</h1>
      <p style="opacity: 0.9; margin: 0;">View and manage your hotel bookings</p>
    </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <ul class="nav nav-tabs" id="bookingTabs">
      <li class="nav-item"><a class="nav-link active" href="#" onclick="filterBookings('all')">All</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="filterBookings('upcoming')">Upcoming</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="filterBookings('completed')">Completed</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="filterBookings('cancelled')">Cancelled</a></li>
    </ul>
    <a href="/hotels" class="btn btn-primary" style="background: var(--primary-gradient); border: none; border-radius: 30px; padding: 0.6rem 1.5rem;">
      <i class="bi bi-plus-circle"></i> Book New Hotel
    </a>
  </div>

  <div id="bookingsList"></div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allBookings = [];

function loadBookings() {
  fetch('/api/bookings/my-bookings')
    .then(r => r.json())
    .then(data => {
      allBookings = data;
      displayBookings('all');
    })
    .catch(e => displayEmpty());
}

function filterBookings(filter) {
  document.querySelectorAll('.nav-tabs .nav-link').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  displayBookings(filter);
}

function displayBookings(filter) {
  const container = document.getElementById('bookingsList');

  let bookings = allBookings;
  if (filter === 'upcoming') {
    bookings = allBookings.filter(b => b.status === 'CONFIRMED' || b.status === 'PENDING');
  } else if (filter === 'completed') {
    bookings = allBookings.filter(b => b.status === 'COMPLETED');
  } else if (filter === 'cancelled') {
    bookings = allBookings.filter(b => b.status === 'CANCELLED');
  }

  if (!bookings || bookings.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <i class="bi bi-calendar-x"></i>
      <h5>No bookings found</h5>
      <p>Book your first hotel and start planning your trip!</p>
      <a href="/hotels" class="btn btn-primary" style="background: var(--primary-gradient); border: none; border-radius: 30px; padding: 0.6rem 1.5rem;">Search Hotels</a>
    </div>`;
    return;
  }

  container.innerHTML = '<div class="row">' + bookings.map((b, i) => {
    const statusClass = b.status === 'CONFIRMED' ? 'status-confirmed' :
                        b.status === 'PENDING' ? 'status-pending' :
                        b.status === 'CANCELLED' ? 'status-cancelled' : 'status-completed';
    const checkIn = new Date(b.checkInDate);
    const checkOut = new Date(b.checkOutDate);
    const today = new Date();
    const isUpcoming = checkIn >= today && b.status === 'CONFIRMED';

    return `<div class="col-md-6 col-lg-4" style="animation-delay: ${i * 0.05}s;">
      <div class="booking-card">
        <img class="booking-card-img" src="${b.hotelImageUrl || 'https://via.placeholder.com/400x180?text=Hotel'}" alt="${b.hotelName}">
        <div class="p-3">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
              <div class="booking-ref">${b.bookingReference}</div>
              <h6 style="font-weight: 700; margin: 0.25rem 0;">${b.hotelName}</h6>
            </div>
            <span class="booking-status ${statusClass}">${b.status}</span>
          </div>
          <div class="booking-detail"><i class="bi bi-geo-alt"></i> ${b.hotelLocation || ''}</div>
          <div class="booking-detail"><i class="bi bi-door-open"></i> ${b.roomTypeName} × ${b.roomCount} room(s)</div>
          <div class="booking-detail"><i class="bi bi-calendar"></i> ${formatDate(b.checkInDate)} - ${formatDate(b.checkOutDate)} (${b.totalNights} nights)</div>
          <div class="booking-detail"><i class="bi bi-person"></i> ${b.guestName || ''}</div>
          <hr style="margin: 0.75rem 0;">
          <div class="d-flex justify-content-between align-items-center">
            <div class="booking-price">₹${Number(b.totalPrice).toLocaleString('en-IN')}</div>
            ${isUpcoming ? '<span class="badge badge-success">Upcoming</span>' : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function displayEmpty() {
  document.getElementById('bookingsList').innerHTML = `<div class="empty-state">
    <i class="bi bi-calendar-x"></i>
    <h5>No bookings yet</h5>
    <p>Book your first hotel stay!</p>
  </div>`;
}

document.addEventListener('DOMContentLoaded', loadBookings);
</script>
    </div>
  </div>
</body>
</html>
