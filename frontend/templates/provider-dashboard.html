<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Dashboard - Roamly</title>
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --provider-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
      --radius-lg: 16px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .navbar {
      background: var(--provider-gradient) !important;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 15px rgba(245, 87, 108, 0.3);
    }
    .navbar-brand { color: white !important; font-weight: 700; font-size: 1.5rem; }
    .welcome-text { color: rgba(255,255,255,0.95); font-weight: 500; }
    .btn-signout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 0.4rem 1rem; border-radius: 30px; transition: var(--transition);
    }
    .btn-signout:hover { background: rgba(255,255,255,0.25); color: white; }
    .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .dashboard-header {
      background: var(--provider-gradient);
      border-radius: var(--radius-lg); padding: 2.5rem; margin-bottom: 2rem; color: white; position: relative; overflow: hidden;
    }
    .header-title { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
    .header-subtitle { font-size: 1.1rem; opacity: 0.9; margin: 0; }
    .section-card { background: white; border-radius: var(--radius-lg); padding: 1.75rem; box-shadow: var(--card-shadow); margin-bottom: 1.5rem; }
    .section-title { font-size: 1.25rem; font-weight: 700; color: #1f2937; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title i { color: #f5576c; }
    .item-card {
      background: linear-gradient(135deg, #fafafa 0%, #f3f4f6 100%);
      border: 1px solid #e5e7eb; border-radius: var(--radius-md);
      padding: 1.25rem; margin-bottom: 1rem; transition: var(--transition);
    }
    .item-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow); }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .item-title { font-size: 1.1rem; font-weight: 600; color: #1f2937; }
    .item-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .hotel-badge { background: #fce7f3; color: #9d174d; }
    .flight-badge { background: #e0f2fe; color: #075985; }
    .item-detail { font-size: 0.85rem; color: #6b7280; margin-bottom: 0.25rem; }
    .item-price { font-size: 1.25rem; font-weight: 700; color: #f5576c; }
    .btn-add {
      background: var(--provider-gradient); border: none; color: white;
      padding: 0.6rem 1.25rem; border-radius: 30px; font-weight: 600; transition: var(--transition);
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); color: white; }
    .btn-edit { background: #667eea; border: none; color: white; padding: 0.4rem 0.75rem; border-radius: 20px; font-size: 0.8rem; }
    .btn-delete { background: #ef4444; border: none; color: white; padding: 0.4rem 0.75rem; border-radius: 20px; font-size: 0.8rem; }
    .modal-header { background: var(--provider-gradient); color: white; }
    .form-control:focus { border-color: #f5576c; box-shadow: 0 0 0 0.2rem rgba(245, 87, 108, 0.25); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animation-delay-1 { animation: fadeInUp 0.5s ease-out 0.1s both; }
    .animation-delay-2 { animation: fadeInUp 0.5s ease-out 0.2s both; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="/">Roamly Provider</a>
  <div class="ml-auto d-flex align-items-center">
    <span class="welcome-text mr-3">
      <span th:text="${providerCompany != null} ? ${providerCompany} : ${userName}"></span>
      <span class="badge badge-light ml-2" th:text="${providerType}"></span>
    </span>
    <form method="post" action="/logout" class="mb-0">
      <button type="submit" class="btn btn-signout btn-sm">Sign Out</button>
    </form>
  </div>
</nav>

<div class="main-content">
  <div class="dashboard-header">
    <h1 class="header-title"><i class="bi bi-briefcase"></i> Provider Dashboard</h1>
    <p class="header-subtitle">Manage your <span th:text="${providerType}"></span> offerings.</p>
  </div>

  <!-- Hotel Management -->
  <div th:if="${providerType.name() == 'HOTEL_PROVIDER'}" class="animation-delay-1">
    <div class="section-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="section-title mb-0"><i class="bi bi-building"></i> My Hotels</h5>
        <a class="btn btn-add" href="/provider/hotels/new"><i class="bi bi-plus-circle"></i> Add Hotel</a>
      </div>
      <div th:each="h : ${hotels}" class="item-card">
        <div class="item-header">
          <span class="item-title" th:text="${h.name}"></span>
          <div>
            <button class="btn btn-edit btn-sm mr-1" th:attr="onclick=|editHotel(${h.id})|"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-delete btn-sm" th:attr="onclick=|deleteHotel(${h.id})|"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        <div class="item-detail"><i class="bi bi-geo-alt"></i> <span th:text="${h.location}"></span></div>
        <div class="item-detail"><i class="bi bi-house-door"></i> <span th:text="${h.roomTypes != null and !h.roomTypes.isEmpty() ? h.roomTypes[0].name : 'Standard'}"></span> | Rooms: <span th:text="${h.totalAvailableRooms}"></span></div>
        <div class="item-detail"><i class="bi bi-star"></i> Rating: <span th:text="${h.rating}"></span>/5</div>
        <div class="item-price mt-2">₹<span th:text="${#numbers.formatDecimal(h.pricePerNight, 1, 2)}"></span><span class="small text-muted">/night</span></div>
      </div>
      <div th:if="${hotels == null or hotels.isEmpty()}" class="text-muted text-center py-4">No hotels added yet. Click "Add Hotel" to get started.</div>
    </div>
  </div>

  <!-- Flight Management -->
  <div th:if="${providerType.name() == 'FLIGHT_PROVIDER'}" class="animation-delay-1">
    <div class="section-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="section-title mb-0"><i class="bi bi-airplane"></i> My Flights</h5>
        <a class="btn btn-add" href="/provider/flights/new"><i class="bi bi-plus-circle"></i> Add Flight</a>
      </div>
      <div th:each="f : ${flights}" class="item-card">
        <div class="item-header">
          <span class="item-title"><span th:text="${f.airline}"></span> - <span th:text="${f.flightNumber}"></span></span>
          <div>
            <a class="btn btn-edit btn-sm mr-1" th:href="@{/provider/flights/{id}/edit(id=${f.id})}"><i class="bi bi-pencil"></i></a>
            <button class="btn btn-delete btn-sm" th:attr="onclick=|deleteFlight(${f.id})|"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        <div class="item-detail"><i class="bi bi-arrow-right"></i> <span th:text="${f.origin}"></span> → <span th:text="${f.destination}"></span></div>
        <div class="item-detail"><i class="bi bi-clock"></i> <span th:text="${f.departureTime}"></span> → <span th:text="${f.arrivalTime}"></span> | Duration: <span th:text="${f.duration}"></span></div>
        <div class="item-detail"><i class="bi bi-tags"></i> Classes: <span th:text="${f.flightClasses != null and !f.flightClasses.isEmpty() ? T(java.util.stream.Collectors).toList(f.flightClasses.![classType]).stream().map(c -> c.name().replace('_', ' ')).collect(T(java.util.stream.Collectors).toList()) : 'None'}"></span></div>
        <div class="item-price mt-2">₹<span th:text="${f.flightClasses != null and !f.flightClasses.isEmpty() ? #numbers.formatDecimal(f.flightClasses[0].price, 1, 2) : 'N/A'}"></span></div>
      </div>
      <div th:if="${flights == null or flights.isEmpty()}" class="text-muted text-center py-4">No flights added yet. Click "Add Flight" to get started.</div>
    </div>
  </div>
</div>

<!-- Add Hotel Modal -->
<div class="modal fade" id="addHotelModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-white"><i class="bi bi-building"></i> Add Hotel</h5>
        <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="hotelForm">
          <div class="form-group"><label>Hotel Name</label><input type="text" name="name" class="form-control" required></div>
          <div class="form-group"><label>Location</label><input type="text" name="location" class="form-control" required></div>
          <div class="form-group"><label>Address</label><input type="text" name="address" class="form-control"></div>
          <div class="form-row">
            <div class="col"><label>Price/Night (₹)</label><input type="number" name="pricePerNight" class="form-control" step="0.01" required></div>
            <div class="col"><label>Room Type</label><input type="text" name="roomType" class="form-control"></div>
          </div>
          <div class="form-row mt-2">
            <div class="col"><label>Available Rooms</label><input type="number" name="availableRooms" class="form-control"></div>
            <div class="col"><label>Rating (1-5)</label><input type="number" name="rating" class="form-control" step="0.1" min="1" max="5"></div>
          </div>
          <div class="form-group mt-2"><label>Amenities</label><input type="text" name="amenities" class="form-control" placeholder="WiFi, Pool, Gym..."></div>
          <div class="form-group"><label>Image URL</label><input type="text" name="imageUrl" class="form-control"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-add" onclick="submitHotel()">Save Hotel</button>
      </div>
    </div>
  </div>
</div>


<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function submitHotel() {
  const form = document.getElementById('hotelForm');
  const fd = new FormData(form);
  const data = Object.fromEntries(fd);
  fetch('/provider/hotels', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r => r.json()).then(d => { $('#addHotelModal').modal('hide'); location.reload(); });
}
function editHotel(id) {
  window.location.href = '/provider/hotels/' + id + '/edit';
}
function deleteHotel(id) {
  if (confirm('Delete this hotel?')) {
    fetch('/provider/hotels/' + id, { method: 'DELETE' }).then(r => location.reload());
  }
}
function deleteFlight(id) {
  if (confirm('Delete this flight?')) {
    fetch('/provider/flights/' + id, { method: 'DELETE' }).then(r => location.reload());
  }
}
</script>
</body>
</html>
