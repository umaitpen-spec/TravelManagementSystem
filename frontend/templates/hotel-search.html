<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hotel Search - Roamly</title>
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/customer-layout.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --hotel-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
      --radius-lg: 16px;
      --radius-md: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .navbar {
      background: var(--primary-gradient) !important;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 15px rgba(102, 126, 234, 0.3);
    }
    .navbar-brand { color: white !important; font-weight: 700; font-size: 1.5rem; }
    .welcome-text { color: rgba(255,255,255,0.95); font-weight: 500; }
    .btn-signout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 0.4rem 1rem; border-radius: 30px; transition: var(--transition);
    }
    .btn-signout:hover { background: rgba(255,255,255,0.25); color: white; }

    .sidebar {
      position: fixed;
      left: 0;
      top: 70px;
      width: 260px;
      height: calc(100vh - 70px);
      background: #1e293b;
      padding: 2rem 0;
      z-index: 100;
    }
    .sidebar-brand {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .sidebar-nav li { margin: 0.25rem 0; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    .sidebar-nav a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }
    .sidebar-nav a.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-left: 3px solid #667eea;
    }
    .sidebar-nav a i { font-size: 1.1rem; width: 20px; text-align: center; }
    .main-content { padding: 2rem 2rem 2rem 280px; max-width: 1400px; margin: 0 auto; }

    .hero-section {
      background: var(--primary-gradient);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      margin-bottom: 2rem;
      color: white;
    }
    .hero-section h1 { font-weight: 700; font-size: 2rem; margin-bottom: 0.5rem; }
    .hero-section p { opacity: 0.9; margin: 0; }

    .search-bar {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      box-shadow: var(--card-shadow);
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-bar input, .search-bar select {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .search-bar input:focus, .search-bar select:focus {
      border-color: #667eea;
      outline: none;
    }
    .btn-search {
      background: var(--primary-gradient);
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 30px;
      font-weight: 600;
      white-space: nowrap;
      transition: var(--transition);
    }
    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); color: white; }

    .hotels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }
    @media (max-width: 768px) {
      .hotels-grid { grid-template-columns: 1fr; }
    }

    .hotel-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
    }
    .hotel-card:hover { transform: translateY(-4px); box-shadow: var(--card-shadow-hover); }

    .hotel-card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    }

    .hotel-card-body { padding: 1.25rem; }

    .hotel-name { font-size: 1.15rem; font-weight: 700; color: #1f2937; margin-bottom: 0.5rem; }

    .hotel-location { font-size: 0.85rem; color: #6b7280; display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.75rem; }

    .hotel-rating { margin-bottom: 0.75rem; }
    .star { color: #f59e0b; font-size: 0.9rem; }

    .hotel-amenities {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .amenity-badge {
      background: #f3f4f6;
      color: #6b7280;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .hotel-price { font-size: 1.25rem; font-weight: 700; color: #667eea; }
    .hotel-price .per-night { font-size: 0.8rem; font-weight: 400; color: #9ca3af; }

    .hotel-availability {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }
    .availability-ok { color: #059669; }
    .availability-low { color: #d97706; }
    .availability-none { color: #dc2626; }

    .btn-book {
      background: var(--hotel-gradient);
      border: none;
      color: white;
      padding: 0.6rem 1.25rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: var(--transition);
      width: 100%;
      margin-top: 1rem;
    }
    .btn-book:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); color: white; }
    .btn-book:disabled { background: #d1d5db; cursor: not-allowed; transform: none; box-shadow: none; }

    .room-type-select {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 0.75rem;
    }

    .empty-state { text-align: center; padding: 4rem 2rem; color: #9ca3af; }
    .empty-state i { font-size: 4rem; color: #d1d5db; margin-bottom: 1rem; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hotel-card { animation: fadeInUp 0.4s ease-out; }
    .hotel-card:nth-child(2) { animation-delay: 0.05s; }
    .hotel-card:nth-child(3) { animation-delay: 0.1s; }
    .hotel-card:nth-child(4) { animation-delay: 0.15s; }
  </style>
</head>
<body>
<nav class="customer-navbar">
  <div class="d-flex justify-content-between align-items-center w-100">
    <a class="navbar-brand" href="/">Roamly</a>
    <div class="d-flex align-items-center">
      <span class="navbar-text mr-3" th:text="${userName != null} ? ${userName} : ''">User</span>
      <form method="post" th:action="@{/logout}">
        <button type="submit" class="btn btn-signout">Sign Out</button>
      </form>
    </div>
  </div>
</nav>

<div th:replace="fragments/customer-sidebar :: sidebar('hotels')"></div>

<div class="customer-main-content">
  <div class="content-wrapper" style="max-width: 1400px;">
    <div class="hero-section">
      <h1><i class="bi bi-building"></i> Hotel Search</h1>
      <p>Find and book the perfect stay for your trip</p>
    </div>

  <div class="search-bar">
    <input type="text" id="searchLocation" placeholder="Enter city or destination..." onkeypress="if(event.key==='Enter') searchHotels()">
    <button class="btn-search" onclick="searchHotels()"><i class="bi bi-search"></i> Search Hotels</button>
    <select id="priceFilter" onchange="searchHotels()">
      <option value="">All Prices</option>
      <option value="0-2000">Under ₹2,000</option>
      <option value="2000-5000">₹2,000 - ₹5,000</option>
      <option value="5000+">₹5,000+</option>
    </select>
  </div>

  <div id="hotelsGrid" class="hotels-grid">
    <div class="empty-state">
      <i class="bi bi-building"></i>
      <h5>Search for hotels</h5>
      <p>Enter a destination to see available hotels</p>
    </div>
  </div>
</div>

<!-- Booking Modal -->
<div class="modal fade" id="bookingModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header" style="background: var(--primary-gradient); color: white;">
        <h5 class="modal-title"><i class="bi bi-calendar-check"></i> Book Hotel</h5>
        <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body">
        <div id="bookingError" class="alert alert-danger" style="display:none;"></div>
        <div class="row">
          <div class="col-md-5">
            <img id="bookingHotelImg" src="" style="width:100%; border-radius: 12px; object-fit: cover; height: 200px;">
            <h5 id="bookingHotelName" class="mt-3 mb-1" style="font-weight: 700;"></h5>
            <p class="text-muted mb-2" style="font-size: 0.9rem;"><i class="bi bi-geo-alt"></i> <span id="bookingHotelLocation"></span></p>
            <div id="bookingAmenities" class="hotel-amenities"></div>
          </div>
          <div class="col-md-7">
            <form id="bookingForm">
              <input type="hidden" id="bookingHotelId">
              <input type="hidden" id="bookingRoomTypeId">

              <div class="form-group">
                <label>Room Type</label>
                <select id="roomTypeSelect" class="form-control" required onchange="updatePrice()">
                  <option value="">Select Room Type</option>
                </select>
              </div>

              <div class="form-row">
                <div class="col">
                  <div class="form-group">
                    <label>Check-in Date</label>
                    <input type="date" id="checkInDate" class="form-control" required onchange="updatePrice()">
                  </div>
                </div>
                <div class="col">
                  <div class="form-group">
                    <label>Check-out Date</label>
                    <input type="date" id="checkOutDate" class="form-control" required onchange="updatePrice()">
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label>Number of Rooms</label>
                <input type="number" id="roomCount" class="form-control" min="1" value="1" required onchange="updatePrice()">
              </div>

              <div class="form-row">
                <div class="col">
                  <div class="form-group">
                    <label>Guest Name</label>
                    <input type="text" id="guestName" class="form-control" required>
                  </div>
                </div>
                <div class="col">
                  <div class="form-group">
                    <label>Guest Email</label>
                    <input type="email" id="guestEmail" class="form-control" required>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="guestPhone" class="form-control">
              </div>

              <div class="form-group">
                <label>Special Requests</label>
                <textarea id="specialRequests" class="form-control" rows="2" placeholder="Any special requests?"></textarea>
              </div>

              <div class="booking-summary mt-3 p-3" style="background: #f3f4f6; border-radius: 12px;">
                <h6 style="font-weight: 700; margin-bottom: 0.75rem;"><i class="bi bi-receipt"></i> Booking Summary</h6>
                <div class="d-flex justify-content-between mb-1">
                  <span>Room Type:</span>
                  <strong id="summaryRoomType">-</strong>
                </div>
                <div class="d-flex justify-content-between mb-1">
                  <span>Nights:</span>
                  <strong id="summaryNights">-</strong>
                </div>
                <div class="d-flex justify-content-between mb-1">
                  <span>Rooms:</span>
                  <strong id="summaryRooms">-</strong>
                </div>
                <div class="d-flex justify-content-between mb-1">
                  <span>Price/Night:</span>
                  <strong id="summaryPricePerNight">-</strong>
                </div>
                <hr>
                <div class="d-flex justify-content-between" style="font-size: 1.1rem;">
                  <span>Total Price:</span>
                  <strong id="summaryTotal" style="color: #667eea;">-</strong>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-book" style="width: auto;" onclick="confirmBooking()">
          <i class="bi bi-calendar-check"></i> Confirm Booking
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentHotels = [];

function searchHotels() {
  const location = document.getElementById('searchLocation').value.trim();
  const priceFilter = document.getElementById('priceFilter').value;
  let url = '/api/hotels';
  if (location) url += '/location/' + encodeURIComponent(location);

  fetch(url)
    .then(r => r.json())
    .then(data => {
      currentHotels = data;
      displayHotels(data, priceFilter);
    })
    .catch(e => { console.error(e); displayEmpty(); });
}

function displayHotels(hotels, priceFilter) {
  const grid = document.getElementById('hotelsGrid');
  if (!hotels || hotels.length === 0) { displayEmpty(); return; }

  let filtered = hotels;
  if (priceFilter) {
    const [min, max] = priceFilter.split('-').map(v => v === '' ? null : parseFloat(v));
    filtered = hotels.filter(h => {
      const p = h.pricePerNight || 0;
      if (max) return p >= min && p <= max;
      return p >= min;
    });
  }

  if (filtered.length === 0) { displayEmpty('No hotels match your filter criteria.'); return; }

  grid.innerHTML = filtered.map((h, i) => {
    const totalRooms = h.totalAvailableRooms || 0;
    const availClass = totalRooms === 0 ? 'availability-none' : totalRooms < 3 ? 'availability-low' : 'availability-ok';
    const availText = totalRooms === 0 ? 'Sold Out' : totalRooms < 3 ? 'Only ' + totalRooms + ' left!' : totalRooms + ' rooms available';
    const price = h.pricePerNight != null ? '₹' + Number(h.pricePerNight).toLocaleString('en-IN') : 'N/A';
    const stars = renderStars(h.rating);
    const amenityList = (h.amenities || '').split(',').filter(Boolean).slice(0, 4);

    return `<div class="hotel-card" style="animation-delay: ${i * 0.05}s;">
      <img class="hotel-card-img" src="${h.imageUrl || 'https://via.placeholder.com/400x200?text=Hotel'}" alt="${h.name}">
      <div class="hotel-card-body">
        <div class="hotel-name">${h.name}</div>
        <div class="hotel-location"><i class="bi bi-geo-alt"></i> ${h.location || 'Location not specified'}</div>
        <div class="hotel-rating">${stars}</div>
        <div class="hotel-amenities">${amenityList.map(a => '<span class="amenity-badge">' + a.trim() + '</span>').join('')}</div>
        <div class="hotel-price">${price} <span class="per-night">/night</span></div>
        <div class="hotel-availability ${availClass}">${availText}</div>
        <a class="btn-book" ${totalRooms === 0 ? 'disabled' : ''} href="/book-hotel/${h.id}">
          ${totalRooms === 0 ? 'Sold Out' : 'Book Now'}
        </a>
      </div>
    </div>`;
  }).join('');
}

function renderStars(rating) {
  if (!rating) return '<span class="star">☆☆☆☆☆</span>';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '<span class="star">' + '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty) + '</span> ' + rating + '/5';
}

function displayEmpty(msg) {
  document.getElementById('hotelsGrid').innerHTML = `<div class="empty-state">
    <i class="bi bi-building"></i>
    <h5>${msg || 'Search for hotels'}</h5>
    <p>${msg ? 'Try a different search or price filter.' : 'Enter a destination to see available hotels'}</p>
  </div>`;
}

function openBookingModal(hotelId) {
  const hotel = currentHotels.find(h => h.id === hotelId);
  if (!hotel) return;

  document.getElementById('bookingHotelId').value = hotelId;
  document.getElementById('bookingHotelName').textContent = hotel.name;
  document.getElementById('bookingHotelLocation').textContent = hotel.location || '';
  document.getElementById('bookingHotelImg').src = hotel.imageUrl || 'https://via.placeholder.com/400x200?text=Hotel';

  const amenityList = (hotel.amenities || '').split(',').filter(Boolean).slice(0, 4);
  document.getElementById('bookingAmenities').innerHTML = amenityList.map(a => '<span class="amenity-badge">' + a.trim() + '</span>').join('');

  // Set min dates
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('checkInDate').min = today;
  document.getElementById('checkInDate').value = today;
  document.getElementById('checkOutDate').min = today;
  document.getElementById('checkOutDate').value = '';
  document.getElementById('checkOutDate').value = '';

  // Pre-fill guest info if available
  document.getElementById('guestName').value = '';
  document.getElementById('guestEmail').value = '';
  document.getElementById('guestPhone').value = '';
  document.getElementById('specialRequests').value = '';
  document.getElementById('roomCount').value = 1;

  // Populate room types
  const roomSelect = document.getElementById('roomTypeSelect');
  roomSelect.innerHTML = '<option value="">Select Room Type</option>';
  if (hotel.roomTypes && hotel.roomTypes.length > 0) {
    hotel.roomTypes.forEach(rt => {
      const avail = rt.availableCount > 0;
      roomSelect.innerHTML += `<option value="${rt.id}" data-price="${rt.pricePerNight}" data-name="${rt.name}" data-avail="${rt.availableCount}" ${!avail ? 'disabled' : ''}>
        ${rt.name} - ₹${Number(rt.pricePerNight).toLocaleString('en-IN')}/night ${!avail ? '(Sold Out)' : '(' + rt.availableCount + ' available)'} ${rt.ac ? 'AC' : 'Non-AC'}
      </option>`;
    });
  } else {
    // Fallback: use hotel price
    roomSelect.innerHTML = `<option value="default" data-price="${hotel.pricePerNight || 0}" data-name="Standard Room">Standard Room - ₹${Number(hotel.pricePerNight || 0).toLocaleString('en-IN')}/night</option>`;
  }

  document.getElementById('bookingError').style.display = 'none';
  updatePrice();
  $('#bookingModal').modal('show');
}

function updatePrice() {
  const roomSelect = document.getElementById('roomTypeSelect');
  const option = roomSelect.options[roomSelect.selectedIndex];
  const pricePerNight = parseFloat(option?.dataset?.price || 0);
  const roomTypeName = option?.dataset?.name || '-';

  const checkIn = new Date(document.getElementById('checkInDate').value);
  const checkOut = new Date(document.getElementById('checkOutDate').value);
  const roomCount = parseInt(document.getElementById('roomCount').value) || 1;

  let nights = 0;
  if (checkOut > checkIn) {
    nights = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));
  }

  const total = nights * pricePerNight * roomCount;

  document.getElementById('summaryRoomType').textContent = roomTypeName;
  document.getElementById('summaryNights').textContent = nights > 0 ? nights + (nights === 1 ? ' night' : ' nights') : '-';
  document.getElementById('summaryRooms').textContent = roomCount + (roomCount === 1 ? ' room' : ' rooms');
  document.getElementById('summaryPricePerNight').textContent = pricePerNight > 0 ? '₹' + Number(pricePerNight).toLocaleString('en-IN') : '-';
  document.getElementById('summaryTotal').textContent = total > 0 ? '₹' + Number(total).toLocaleString('en-IN') : '-';
}

function confirmBooking() {
  const hotelId = document.getElementById('bookingHotelId').value;
  const roomTypeSelect = document.getElementById('roomTypeSelect');
  const roomTypeId = roomTypeSelect.value === 'default' ? null : roomTypeSelect.value;
  const checkIn = document.getElementById('checkInDate').value;
  const checkOut = document.getElementById('checkOutDate').value;
  const roomCount = parseInt(document.getElementById('roomCount').value) || 1;
  const guestName = document.getElementById('guestName').value;
  const guestEmail = document.getElementById('guestEmail').value;
  const guestPhone = document.getElementById('guestPhone').value;
  const specialRequests = document.getElementById('specialRequests').value;

  if (!roomTypeId && !hotelId) {
    showBookingError('Please select a valid room type');
    return;
  }
  if (!checkIn || !checkOut) {
    showBookingError('Please select check-in and check-out dates');
    return;
  }
  if (!guestName || !guestEmail) {
    showBookingError('Please fill in guest name and email');
    return;
  }

  const request = {
    hotelId: parseInt(hotelId),
    roomTypeId: roomTypeId ? parseInt(roomTypeId) : null,
    checkInDate: checkIn,
    checkOutDate: checkOut,
    roomCount: roomCount,
    guestName: guestName,
    guestEmail: guestEmail,
    guestPhone: guestPhone,
    specialRequests: specialRequests
  };

  fetch('/api/bookings/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(request)
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      showBookingError(data.error);
    } else {
      $('#bookingModal').modal('hide');
      alert('Booking confirmed! Reference: ' + data.bookingReference);
      searchHotels();
    }
  })
  .catch(e => showBookingError('Booking failed. Please try again.'));
}

function showBookingError(msg) {
  const el = document.getElementById('bookingError');
  el.textContent = msg;
  el.style.display = 'block';
}

// Load all hotels on page load
document.addEventListener('DOMContentLoaded', function() {
  searchHotels();
});
</script>
    </div>
  </div>
</body>
</html>
