<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Sidebar Fragment -->
<div th:fragment="customer-sidebar (currentPage)" class="customer-sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="url(#logoGrad)"/>
        <path d="M18 8l10 5.5v9L18 28l-10-5.5v-9L18 8z" stroke="white" stroke-width="2" fill="none"/>
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36">
            <stop offset="0%" stop-color="#0ea5e9"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="sidebar-brand"></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
        <a th:href="@{/}" class="nav-link">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'trips'} ? 'active' : ''">
        <a th:href="@{/my-trips}" class="nav-link">
          <i class="bi bi-airplane"></i>
          <span>My Trips</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'bookings'} ? 'active' : ''">
        <a th:href="@{/bookings}" class="nav-link">
          <i class="bi bi-calendar-check"></i>
          <span>Bookings</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'hotels'} ? 'active' : ''">
        <a th:href="@{/hotels}" class="nav-link">
          <i class="bi bi-building"></i>
          <span>Hotels</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'activities'} ? 'active' : ''">
        <a th:href="@{/activities}" class="nav-link">
          <i class="bi bi-compass"></i>
          <span>Activities</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'itineraries'} ? 'active' : ''">
        <a th:href="@{/itineraries}" class="nav-link">
          <i class="bi bi-map"></i>
          <span>Saved Itineraries</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'profile'} ? 'active' : ''">
        <a th:href="@{/profile}" class="nav-link">
          <i class="bi bi-person-circle"></i>
          <span>Profile</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <form method="post" th:action="@{/logout}" class="logout-form">
        <button type="submit" class="nav-link logout-btn">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </button>
      </form>
    </div>
  </nav>
</div>

<style th:fragment="customer-sidebar-styles">
.customer-sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 280px;
  height: 100vh;
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  box-shadow: 4px 0 20px rgba(0, 0, 0, 0.3);
}

.sidebar-header {
  padding: 1.5rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.sidebar-brand {
  padding: 0 1.5rem 2rem;
}

.sidebar-nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 1rem 0;
  overflow-y: auto;
}

.nav-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.nav-item {
  margin: 0.25rem 0;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.5rem;
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  font-weight: 500;
  transition: all 0.3s ease;
  border-left: 3px solid transparent;
}

.nav-link i {
  font-size: 1.25rem;
  width: 24px;
  text-align: center;
}

.nav-link:hover {
  background: rgba(255, 255, 255, 0.05);
  color: white;
  border-left-color: rgba(255, 255, 255, 0.3);
}

.nav-item.active .nav-link {
  background: linear-gradient(90deg, rgba(14, 165, 233, 0.3) 0%, transparent 100%);
  color: white;
  border-left-color: var(--primary);
}

.nav-item.active .nav-link i {
  color: var(--primary);
}

.sidebar-footer {
  padding: 1rem 0;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.logout-form {
  margin: 0;
}

.logout-btn {
  background: none;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: left;
}

.logout-btn:hover {
  background: rgba(220, 53, 69, 0.1);
  color: #ff6b6b;
  border-left-color: #dc3545;
}

/* Scrollbar styling */
.sidebar-nav::-webkit-scrollbar {
  width: 6px;
}

.sidebar-nav::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
}

.sidebar-nav::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 3px;
}

.sidebar-nav::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.3);
}

/* Main content area */
.customer-main-content {
  margin-left: 280px;
  min-height: 100vh;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
}
</style>
</body>
</html>
