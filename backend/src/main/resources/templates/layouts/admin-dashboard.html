<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - Roamly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --accent: #1b4965;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    body {
      background: var(--bg-primary);
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
    }
    .navbar {
      background: var(--bg-secondary) !important;
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border-color);
    }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .navbar-brand span { color: var(--accent); }
    .welcome-text { color: var(--text-primary); font-weight: 500; }
    .btn-signout {
      background: var(--accent); border: 1px solid var(--accent);
      color: white; padding: 0.4rem 1rem; border-radius: 8px; transition: var(--transition-base);
    }
    .btn-signout:hover { background: #154257; color: white; }
    .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .dashboard-header {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg); padding: 2.5rem; margin-bottom: 2rem; color: var(--text-primary); position: relative; overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }
    .dashboard-header::before {
      content: ''; position: absolute; top: -50%; right: -10%;
      width: 300px; height: 300px; background: rgba(27, 73, 101, 0.05); border-radius: 50%;
    }
    .header-title { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--accent); }
    .header-subtitle { font-size: 1.1rem; color: var(--text-secondary); margin: 0; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-base); text-align: center; position: relative; overflow: hidden;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent);
    }
    .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); font-weight: 600; margin-top: 0.25rem; }
    .section-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.75rem; box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; }
    .section-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title i { color: var(--accent); }
    .user-table td, .user-table th { vertical-align: middle; }
    .badge-role { padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-admin { background: #fee2e2; color: #991b1b; }
    .badge-provider { background: #fef3c7; color: #92400e; }
    .badge-user { background: #dbeafe; color: #1e40af; }
    .badge-enabled { background: #d1fae5; color: #065f46; }
    .badge-disabled { background: #fee2e2; color: #991b1b; }
    .btn-toggle { cursor: pointer; }
    .provider-badge { padding: 0.25rem 0.5rem; border-radius: 8px; font-size: 0.7rem; font-weight: 600; }
    .hotel-badge { background: #fce7f3; color: #9d174d; }
    .flight-badge { background: #e0f2fe; color: #075985; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animation-delay-1 { animation: fadeInUp 0.5s ease-out 0.1s both; }
    .animation-delay-2 { animation: fadeInUp 0.5s ease-out 0.2s both; }
    .animation-delay-3 { animation: fadeInUp 0.5s ease-out 0.3s both; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 0.75rem; color: white; font-weight: 500; box-shadow: var(--shadow-md); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 0.75rem; }
    .toast.success { background: var(--accent); }
    .toast.error { background: #ef4444; }
    .toast.info { background: #3b82f6; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    .text-muted { color: var(--text-secondary) !important; }
    .border { border-color: var(--border-color) !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="/">Roamly Admin</a>
  <div class="ml-auto d-flex align-items-center">
    <span class="welcome-text mr-3"><i class="bi bi-lock"></i> <span th:text="${userName}"></span></span>
    <form method="post" action="/logout" class="mb-0">
      <button type="submit" class="btn btn-signout btn-sm">Sign Out</button>
    </form>
  </div>
</nav>

<div id="toastContainer" class="toast-container"></div>

<div class="main-content">
  <div class="dashboard-header">
    <h1 class="header-title"><i class="bi bi-shield-check"></i> Admin Dashboard</h1>
    <p class="header-subtitle">Manage users, providers, and platform analytics.</p>
  </div>

  <div class="stats-row animation-delay-1">
    <div class="stat-card">
      <div class="stat-number" th:text="${totalUsers}">0</div>
      <div class="stat-label">Total Travelers</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${totalProviders}">0</div>
      <div class="stat-label">Service Providers</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${allTrips != null ? allTrips.size() : 0}">0</div>
      <div class="stat-label">Total Trips</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" th:text="${hotels != null ? hotels.size() : 0}">0</div>
      <div class="stat-label">Hotels Listed</div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-6 animation-delay-2">
      <div class="section-card">
        <h5 class="section-title"><i class="bi bi-people"></i> All Users</h5>
        <table class="table user-table">
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u : ${allUsers}">
              <td th:text="${u.name}"></td>
              <td th:text="${u.email}"></td>
              <td>
                <span th:if="${u.role.name() == 'ROLE_ADMIN'}" class="badge-role badge-admin">ADMIN</span>
                <span th:if="${u.role.name() == 'ROLE_SERVICE_PROVIDER'}" class="badge-role badge-provider">PROVIDER</span>
                <span th:if="${u.role.name() == 'ROLE_USER'}" class="badge-role badge-user">USER</span>
              </td>
              <td>
                <span th:if="${u.enabled}" class="badge-role badge-enabled">Active</span>
                <span th:if="${!u.enabled}" class="badge-role badge-disabled">Disabled</span>
              </td>
              <td>
                <button th:if="${u.role.name() != 'ROLE_ADMIN'}"
                        class="btn btn-sm btn-outline-secondary btn-toggle"
                        th:attr="onclick=|toggleUser(${u.id})|"
                        th:text="${u.enabled ? 'Disable' : 'Enable'}"></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="col-lg-6 animation-delay-3">
      <div class="section-card">
        <h5 class="section-title"><i class="bi bi-building"></i> Service Providers</h5>
        <div th:each="p : ${providers}" class="mb-3 p-3 border rounded">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <strong th:text="${p.name}"></strong>
              <span th:if="${p.providerType.name() == 'HOTEL_PROVIDER'}" class="provider-badge hotel-badge ml-2">HOTEL</span>
              <span th:if="${p.providerType.name() == 'FLIGHT_PROVIDER'}" class="provider-badge flight-badge ml-2">FLIGHT</span>
              <div class="text-muted small" th:text="${p.email}"></div>
              <div class="text-muted small" th:text="${p.providerCompany}"></div>
            </div>
            <div>
              <span th:if="${p.enabled}" class="badge-role badge-enabled">Active</span>
              <span th:if="${!p.enabled}" class="badge-role badge-disabled">Disabled</span>
            </div>
          </div>
        </div>
        <div th:if="${providers == null or providers.isEmpty()}" class="text-muted text-center py-3">No providers yet.</div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function toggleUser(id) {
  fetch('/admin/users/' + id + '/toggle', { method: 'POST' })
    .then(r => r.json())
    .then(d => location.reload())
    .catch(e => showToast('Error toggling user', 'error'));
}
</script>
</body>
</html>
