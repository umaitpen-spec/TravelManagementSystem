<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} + ' - Roamly'">Roamly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --accent: #1b4965;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-fast: 0.15s ease;
      --transition-base: 0.3s ease;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }
    a { text-decoration: none; }

    /* Navbar */
    .customer-navbar {
      background: var(--bg-secondary);
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid var(--border-color);
    }
    .navbar-brand {
      color: var(--text-primary) !important;
      font-weight: 700;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .navbar-brand span { color: var(--accent); }
    .navbar-text {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .btn-signout {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      transition: var(--transition-fast);
    }
    .btn-signout:hover {
      background: var(--bg-primary);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Sidebar */
    .customer-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
      border-right: 1px solid var(--border-color);
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-brand {
      padding: 0 1.5rem 2rem;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1rem 0;
      overflow-y: auto;
    }

    .nav-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .nav-item {
      margin: 0.25rem 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      border-left{: 3px solid transparent;
    }

    .nav-link i {
      font-size: 1.25rem;
      width: 24px;
      text-align: center;
    }

    .nav-link:hover {
      background: var(--bg-primary);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .nav-item.active .nav-link {
      background: rgba(27, 73, 101, 0.08);
      color: var(--accent);
      border-left-color: var(--accent);
    }

    .nav-item.active .nav-link i {
      color: var(--accent);
    }

    .sidebar-footer {
      padding: 1rem 0;
      border-top: 1px solid var(--border-color);
    }

    .logout-form {
      margin: 0;
    }

    .logout-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      border-left-color: #dc3545;
    }

    /* Scrollbar */
    .sidebar-nav::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-nav::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    .sidebar-nav::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }
    .sidebar-nav::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Main content */
    .customer-main-content {
      margin-left: 280px;
      minvh;
    }

    .content-wrapper {
      padding: 2rem;
    }

    /* Responsive */
    @media (max-width: 991px) {
      .customer-sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .customer-sidebar.open {
        transform: translateX(0);
      }
      .customer-main-content {
        margin-left: 0;
      }
    }
  </style>
  <th:block th:replace="${extraStyles ?: ''}"></th:block>
</head>
<body>

<!-- Navbar -->
<nav class="customer-navbar">
  <div class="d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="/"><span>🌍 Roamly</span></a>
    <div class="d-flex align-items-center">
      <span class="navbar-text mr-3" th:text="${userName != null} ? ${userName} : ''">User</span>
      <form method="post" th:action="@{/logout}">
        <button type="submit" class="btn btn-signout">Sign Out</button>
      </form>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<aside class="customer-sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="#1b4965"/>
        <path d="M18 8l10 5.5v9L18 28l-10-5.5v-9L18 8z" stroke="white" stroke-width="2" fill="none"/>
      </svg>
      <span class="sidebar-brand"></span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item" th:classappend="${currentPage == 'dashboard'} ? 'active' : ''">
        <a th:href="@{/}" class="nav-link">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'trips'} ? 'active' : ''">
        <a th:href="@{/my-trips}" class="nav-link">
          <i class="bi bi-airplane"></i>
          <span>My Trips</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'bookings'} ? 'active' : ''">
        <a th:href="@{/bookings}" class="nav-link">
          <i class="bi bi-calendar-check"></i>
          <span>Bookings</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'hotels'} ? 'active' : ''">
        <a th:href="@{/hotels}" class="nav-link">
          <i class="bi bi-building"></i>
          <span>Hotels</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'activities'} ? 'active' : ''">
        <a th:href="@{/activities}" class="nav-link">
          <i class="bi bi-compass"></i>
          <span>Activities</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'itineraries'} ? 'active' : ''">
        <a th:href="@{/itineraries}" class="nav-link">
          <i class="bi bi-map"></i>
          <span>Saved Itineraries</span>
        </a>
      </li>
      <li class="nav-item" th:classappend="${currentPage == 'profile'} ? 'active' : ''">
        <a th:href="@{/profile}" class="nav-link">
          <i class="bi bi-person-circle"></i>
          <span>Profile</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <form method="post" th:action="@{/logout}" class="logout-form">
        <button type="submit" class="nav-link logout-btn">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </button>
      </form>
    </div>
  </nav>
</aside>

<!-- Main Content -->
<main class="customer-main-content">
  <div class="content-wrapper" th:insert="${content}">
    <!-- Page content inserted here -->
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${extraScripts ?: ''}"></th:block>
</body>
</html>
