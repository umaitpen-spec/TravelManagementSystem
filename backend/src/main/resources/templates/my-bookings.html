<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Bookings - Roamly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #717171;
      --text-muted: #9ca3af;
      --accent: #1b4965;
      --accent-hover: #0056b3;
      --success: #008009;
      --warning: #e8a800;
      --danger: #c23500;
      --border-color: #e0e0e0;
      --border-subtle: #e8e8e8;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --primary-solid: #1b4965;
      --primary-gradient: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      --transition-fast: 0.15s ease;
      --transition-base: 0.3s ease;
    }

    * { box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    .navbar {
      background: var(--bg-secondary) !important;
      padding: 0.8rem 2rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar-brand {
      color: var(--accent) !important;
      font-weight: 700;
      font-size: 1.4rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .navbar-brand .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-link-item {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-link-item:hover, .nav-link-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .welcome-text { color: var(--text-secondary); font-size: 0.9rem; }
    .btn-signout {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-signout:hover {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    .main-content {
      padding: 2rem;
    }

    .content-header {
      background: var(--accent);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      animation: slideDown 0.6s ease;
    }

    .content-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .content-header::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: 15%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .content-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: white;
      position: relative;
      z-index: 1;
    }

    .content-header p {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      margin-bottom: 1.5rem;
      animation: fadeIn 0.6s ease;
    }

    .card:last-child {
      margin-bottom: 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .card-header i { font-size: 1.5rem; color: var(--accent); }

    .card-header h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .booking-item {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .booking-item:hover {
      border-color: var(--accent);
      transform: translateX(6px);
      box-shadow: var(--shadow-md);
    }

    .booking-item:last-child { margin-bottom: 0; }

    .booking-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .booking-type {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .booking-type i { color: var(--accent); }

    .booking-price { font-weight: 700; color: var(--accent); }

    .booking-details {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .badge-success {
      background-color: #10b981;
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .badge-warning {
      background-color: #f59e0b;
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-secondary);
    }

    .empty-state i { font-size: 3.5rem; margin-bottom: 1rem; color: var(--text-muted); }

    .empty-state h6 {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .content-header { padding: 1.75rem; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">
    <span class="brand-icon"><i class="bi bi-globe-americas"></i></span>
    Roamly
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link-item">Dashboard</a>
    <a href="/trips/new" class="nav-link-item">Plan a Trip</a>
    <a href="/my-bookings" class="nav-link-item active">My Bookings</a>
    <a href="/hotels" class="nav-link-item">Hotels</a>
    <a href="/flights/search" class="nav-link-item">Flights</a>
    <a href="/expenses" class="nav-link-item">Expenses</a>
  </div>
  <div class="nav-user">
    <span class="welcome-text" th:text="${userName != null} ? ('Welcome, ' + ${userName}) : ''"></span>
    <form method="post" action="/logout" class="mb-0">
      <button type="submit" class="btn-signout">Sign Out</button>
    </form>
  </div>
</nav>

<div class="main-content container-fluid">
  <!-- Content Header -->
  <div class="content-header">
    <h1><i class="bi bi-calendar-check"></i> My Bookings</h1>
    <p>View all your travel bookings in one place.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <i class="bi bi-building"></i>
      <h3>Hotel Bookings</h3>
    </div>
    <div id="hotel-bookings-container"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <i class="bi bi-airplane"></i>
      <h3>Flight Bookings</h3>
    </div>
    <div id="flight-bookings-container"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  loadFlightBookings();
  loadHotelBookings();
});

function loadFlightBookings() {
  const container = document.getElementById('flight-bookings-container');
  fetch('/api/flight-bookings/my-bookings')
    .then(r => r.json())
    .then(bookings => {
      if (!bookings || bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-airplane"></i>
            <h6>No flight bookings yet</h6>
          </div>`;
        return;
      }
      container.innerHTML = bookings.map(b => `
        <div class="booking-item">
          <div class="booking-header">
            <div class="booking-type">
              <i class="bi bi-airplane"></i>
              ${b.airline || 'Flight'} - ${b.flightNumber || ''}
            </div>
            <div class="booking-price">₹${b.totalPrice ? b.totalPrice.toFixed(2) : '0.00'}</div>
          </div>
          <div class="booking-details">
            <div><strong>Ref:</strong> ${b.bookingReference || 'N/A'}</div>
            <div><strong>Status:</strong> <span class="badge badge-${b.status === 'CONFIRMED' ? 'success' : 'warning'}">${b.status || 'N/A'}</span></div>
            <div><strong>Route:</strong> ${b.sourceCity || 'N/A'} → ${b.destinationCity || 'N/A'}</div>
            <div><strong>Class:</strong> ${b.seatClass || 'N/A'}</div>
            <div><strong>Passengers:</strong> ${b.passengerCount || 0}</div>
            <div><strong>Travel Date:</strong> ${b.travelDate || 'N/A'}</div>
          </div>
        </div>
      `).join('');
    });
}

function loadHotelBookings() {
  const container = document.getElementById('hotel-bookings-container');
  fetch('/api/bookings/my-bookings')
    .then(r => r.json())
    .then(bookings => {
      if (!bookings || bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-building"></i>
            <h6>No hotel bookings yet</h6>
          </div>`;
        return;
      }
      container.innerHTML = bookings.map(b => `
        <div class="booking-item">
          <div class="booking-header">
            <div class="booking-type">
              <i class="bi bi-building"></i>
              ${b.hotelName || b.hotel?.name || 'Hotel'}
            </div>
            <div class="booking-price">₹${b.totalPrice ? b.totalPrice.toFixed(2) : '0.00'}</div>
          </div>
          <div class="booking-details">
            <div><strong>Ref:</strong> ${b.bookingReference || 'N/A'}</div>
            <div><strong>Status:</strong> <span class="badge badge-${b.status === 'CONFIRMED' ? 'success' : 'warning'}">${b.status || 'N/A'}</span></div>
            <div><strong>Check-in:</strong> ${b.checkInDate || 'N/A'}</div>
            <div><strong>Check-out:</strong> ${b.checkOutDate || 'N/A'}</div>
            <div><strong>Guests:</strong> ${b.guestCount || 0}</div>
          </div>
        </div>
      `).join('');
    });
}
</script>
</body>
</html>
