<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Flight Bookings - Roamly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --accent: #1b4965;
      --accent-light: #e8f4f8;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition-fast: 0.15s ease;
      --transition-base: 0.3s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
    }

    .navbar {
      background: var(--bg-secondary) !important;
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border-color);
    }

    .navbar-brand {
      color: var(--accent) !important;
      font-weight: 700;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .welcome-text {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .btn-signout {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.4rem 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition-base);
    }

    .btn-signout:hover {
      background: var(--bg-primary);
      color: var(--accent);
    }

    .page-wrapper { display: flex; min-height: calc(100vh - 70px); }

    .sidebar {
      width: 260px;
      background: var(--bg-secondary);
      padding: 2rem 0;
      position: fixed;
      height: calc(100vh - 70px);
      overflow-y: auto;
      border-right: 1px solid var(--border-color);
    }

    .sidebar-brand { padding: 0 1.5rem 2rem; }
    .sidebar-brand h2 {
      color: var(--accent);
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
    }

    .sidebar-nav { list-style: none; padding: 0; margin: 0; }
    .sidebar-nav li { margin: 0.25rem 0; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition-base);
      font-size: 0.95rem;
    }

    .sidebar-nav a:hover {
      background: var(--bg-primary);
      color: var(--accent);
    }

    .sidebar-nav a.active {
      background: var(--accent-light);
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }

    .sidebar-nav a i { font-size: 1.1rem; width: 20px; text-align: center; }

    .main-content { flex: 1; margin-left: 260px; padding: 2rem; }

    .content-header {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .content-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .content-header p {
      font-size: 1rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .card-header i { font-size: 1.5rem; color: var(--accent); }
    .card-header h3 { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin: 0; }

    .booking-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      transition: var(--transition-base);
    }

    .booking-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: var(--shadow-md);
    }

    .booking-card:last-child { margin-bottom: 0; }

    .booking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }

    .booking-ref {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      color: var(--accent);
      font-size: 0.9rem;
    }

    .booking-status {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-confirmed { background: #d1fae5; color: #059669; }
    .status-cancelled { background: #fee2e2; color: #dc2626; }
    .status-completed { background: var(--accent-light); color: var(--accent); }
    .status-pending { background: #fef3c7; color: #d97706; }

    .flight-route { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .route-city { font-weight: 600; color: var(--text-primary); font-size: 1.1rem; }
    .route-arrow { color: var(--accent); font-size: 1.2rem; }

    .flight-info { display: flex; gap: 2rem; font-size: 0.85rem; color: var(--text-secondary); }
    .flight-info span { display: flex; align-items: center; gap: 0.4rem; }

    .booking-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-color);
      margin-top: 0.75rem;
    }

    .booking-date { font-size: 0.85rem; color: var(--text-secondary); }
    .booking-price { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: var(--border-color); }
    .empty-state h5 { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.9rem; }

    .btn-primary-accent {
      background: var(--accent);
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: var(--transition-base);
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary-accent:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    @media (max-width: 968px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 1.5rem; }
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">
    <span class="brand-icon"><i class="bi bi-globe-americas"></i></span>
    Roamly
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link-item">Dashboard</a>
    <a href="/trips/new" class="nav-link-item">Plan a Trip</a>
    <a href="/my-bookings" class="nav-link-item">My Bookings</a>
    <a href="/hotels" class="nav-link-item">Hotels</a>
    <a href="/flights/search" class="nav-link-item active">Flights</a>
    <a href="/expenses" class="nav-link-item">Expenses</a>
  </div>
  <div class="nav-user">
    <span class="welcome-text" th:text="${userName != null} ? ('Welcome, ' + ${userName}) : ''"></span>
    <form method="post" action="/logout" class="mb-0">
      <button type="submit" class="btn-signout">Sign Out</button>
    </form>
  </div>
</nav>

<div class="page-wrapper">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h2><i class="bi bi-globe-americas"></i> Roamly</h2>
    </div>
    <ul class="sidebar-nav">
      <li><a href="/"><i class="bi bi-house"></i><span>Dashboard</span></a></li>
      <li><a href="/my-bookings"><i class="bi bi-calendar-check"></i><span>My Bookings</span></a></li>
      <li><a href="/hotels"><i class="bi bi-building"></i><span>Hotels</span></a></li>
      <li><a href="/flights/search"><i class="bi bi-airplane"></i><span>Flights</span></a></li>
      <li><a href="/expenses"><i class="bi bi-wallet2"></i><span>Expenses</span></a></li>
      <li><a href="/trips/new"><i class="bi bi-plus-circle"></i><span>Create Trip</span></a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="content-header">
      <h1>My Flight Bookings</h1>
      <p>View and manage all your flight reservations.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="bi bi-airplane"></i>
        <h3>Flight Reservations</h3>
      </div>

      <div id="bookings-container">
        <div class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Loading your flight bookings...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  loadBookings();
});

function loadBookings() {
  fetch('/api/flight-bookings/my-bookings')
    .then(response => response.json())
    .then(data => {
      const container = document.getElementById('bookings-container');
      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-airplane"></i>
            <h5>No flight bookings yet</h5>
            <p>Book your first flight and it will appear here.</p>
            <a href="/flights/search" class="btn btn-primary-accent mt-3">Search Flights</a>
          </div>`;
        return;
      }

      container.innerHTML = data.map(booking => `
        <div class="booking-card">
          <div class="booking-header">
            <span class="booking-ref">${booking.bookingReference}</span>
            <span class="booking-status status-${booking.status.toLowerCase()}">${booking.status}</span>
          </div>
          <div class="flight-route">
            <span class="route-city">${booking.flight?.sourceCity || 'N/A'}</span>
            <span class="route-arrow"><i class="bi bi-arrow-right"></i></span>
            <span class="route-city">${booking.flight?.destinationCity || 'N/A'}</span>
          </div>
          <div class="flight-info">
            <span><i class="bi bi-calendar"></i> ${formatDate(booking.travelDate)}</span>
            <span><i class="bi bi-person"></i> ${booking.passengerCount} passenger(s)</span>
            <span><i class="bi bi-armchair"></i> ${booking.seatClass}</span>
          </div>
          <div class="booking-footer">
            <span class="booking-date">Booked on ${formatDate(booking.createdAt)}</span>
            <span class="booking-price">$${booking.totalPrice.toFixed(2)}</span>
          </div>
        </div>
      `).join('');
    })
    .catch(error => {
      document.getElementById('bookings-container').innerHTML = `
        <div class="empty-state">
          <i class="bi bi-exclamation-triangle"></i>
          <h5>Error loading bookings</h5>
          <p>Please try again later.</p>
        </div>`;
    });
}

function formatDate(dateStr) {
  if (!dateStr) return 'N/A';
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
</script>
</body>
</html>
