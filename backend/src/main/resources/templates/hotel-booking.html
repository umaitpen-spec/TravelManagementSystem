<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${hotel.name} + ' - Book Now - Roamly'">Hotel Booking - Roamly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #717171;
      --text-muted: #9ca3af;
      --accent: #1b4965;
      --accent-hover: #0056b3;
      --success: #008009;
      --warning: #e8a800;
      --danger: #c23500;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      background: var(--bg-secondary) !important;
      padding: 0.8rem 2rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar-brand {
      color: var(--accent) !important;
      font-weight: 700;
      font-size: 1.4rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .navbar-brand .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-link-item {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-link-item:hover, .nav-link-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .welcome-text { color: var(--text-secondary); font-size: 0.9rem; }
    .btn-signout {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-signout:hover {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    /* Main Container */
    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Hero Header */
    .hero-header {
      background: var(--accent);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-header h1 {
      color: white;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .hero-header p {
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
      margin: 0;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
    }
    .card-header-custom {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .card-header-custom i {
      font-size: 1.5rem;
      color: var(--accent);
    }
    .card-header-custom h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .card-body-custom {
      padding: 1.5rem;
    }

    /* Hotel Info Card */
    .hotel-info-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .hotel-info-img { width: 100%; height: 280px; object-fit: cover; }
    .hotel-info-body { padding: 1.5rem; }
    .hotel-name { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
    .hotel-location { color: var(--text-secondary); display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.75rem; }
    .hotel-price { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .star { color: #f59e0b; }

    /* Booking Form Card */
    .booking-form-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Room Type Options */
    .room-type-option {
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .room-type-option:hover { border-color: var(--accent); }
    .room-type-option.selected { border-color: var(--accent); background: rgba(27, 73, 101, 0.05); }
    .room-type-option .price { font-weight: 700; color: var(--accent); }

    /* Form Styles */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }

    .form-group {
      position: relative;
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .form-control {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      background: #fafafa;
      color: var(--text-primary);
      transition: all 0.2s;
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(27, 73, 101, 0.1);
    }

    /* Booking Summary */
    .booking-summary {
      background: #fafafa;
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin: 1.5rem 0;
      border: 1px solid var(--border-color);
    }
    .booking-summary h6 {
      font-weight: 700;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Buttons */
    .btn-back {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }
    .btn-back:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-book {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      color: white;
      padding: 0.9rem 2rem;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s;
      width: 100%;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
      color: white;
    }
    .btn-book:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }

    /* Toast */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast {
      padding: 1rem 1.5rem;
      border-radius: var(--radius-md);
      margin-bottom: 0.75rem;
      color: white;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hotel-info-card { animation: fadeInUp 0.4s ease-out; }
    .booking-form-card { animation: fadeInUp 0.4s ease-out; animation-delay: 0.1s; }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar { padding: 0.75rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .page-container { padding: 1rem; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="/">
      <span class="brand-icon"><i class="bi bi-globe-americas"></i></span>
      Roamly
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link-item">Dashboard</a>
      <a href="/trips/new" class="nav-link-item">Plan a Trip</a>
      <a href="/my-bookings" class="nav-link-item">My Bookings</a>
      <a href="/hotels" class="nav-link-item active">Hotels</a>
      <a href="/flights/search" class="nav-link-item">Flights</a>
      <a href="/expenses" class="nav-link-item">Expenses</a>
    </div>
    <div class="nav-user">
      <span class="welcome-text" th:text="${userName != null} ? ('Welcome, ' + ${userName}) : ''"></span>
      <form method="post" action="/logout" class="mb-0">
        <button type="submit" class="btn-signout">Sign Out</button>
      </form>
    </div>
  </nav>

  <div id="toastContainer" class="toast-container"></div>

  <div class="page-container">
    <!-- Hero Header -->
    <div class="hero-header">
      <h1>🏨 Hotel Booking</h1>
      <p th:text="${hotel.name}">Book your stay with ease</p>
    </div>
    <a href="/hotels" class="btn-back"><i class="bi bi-arrow-left"></i> Back to Hotels</a>
    <div id="errorMessage" class="error-message"></div>

    <div class="hotel-info-card">
      <img class="hotel-info-img" th:src="${hotel.imageUrl} ?: 'https://via.placeholder.com/800x300?text=Hotel'" th:alt="${hotel.name}">
      <div class="hotel-info-body">
        <h2 class="hotel-name" th:text="${hotel.name}">Hotel Name</h2>
        <div class="hotel-location"><i class="bi bi-geo-alt"></i> <span th:text="${hotel.location}">Location</span></div>
        <div class="hotel-price">₹<span th:text="${#numbers.formatDecimal(hotel.pricePerNight, 1, 'COMMA', 0, 'POINT')}">0</span> <small>/night</small></div>
        <div class="mt-2" th:if="${hotel.rating != null}">
          <span class="star"><i class="bi bi-star-fill"></i></span> <span th:text="${hotel.rating}">4.5</span>/5
        </div>
      </div>
    </div>

    <form id="bookingForm" class="booking-form-card" onsubmit="return submitBooking(event)">
      <input type="hidden" id="hotelId" th:value="${hotel.id}">

      <h4 class="form-section-title"><i class="bi bi-building"></i> Select Room Type</h4>
      <div id="roomTypesContainer" class="mb-4">
        <div th:each="rt : ${roomTypes}" class="room-type-option" th:data-id="${rt.id}" th:data-price="${rt.pricePerNight}" th:data-name="${rt.name}" th:data-avail="${rt.availableCount}" onclick="selectRoom(this)">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <strong th:text="${rt.name}">Room Type</strong>
              <span class="ml-2" th:if="${rt.ac}"><i class="bi bi-snow2"></i> AC</span>
              <span class="ml-2" th:if="${!rt.ac}"><i class="bi bi-fan"></i> Non-AC</span>
              <div class="text-muted" style="font-size: 0.85rem;">
                <span th:text="${rt.availableCount}">5</span> available | <span th:text="${rt.capacity}">2</span> guests max
              </div>
            </div>
            <div class="text-right">
              <div class="price">₹<span th:text="${#numbers.formatDecimal(rt.pricePerNight, 1, 'COMMA', 0, 'POINT')}">0</span>/night</div>
            </div>
          </div>
        </div>
        <div th:if="${roomTypes == null or roomTypes.isEmpty()}" class="room-type-option selected" onclick="selectRoom(this)" data-id="default" th:data-price="${hotel.pricePerNight}" data-name="Standard Room">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <strong>Standard Room</strong>
              <span class="ml-2"><i class="bi bi-snow2"></i> AC</span>
            </div>
            <div class="text-right">
              <div class="price">₹<span th:text="${#numbers.formatDecimal(hotel.pricePerNight, 1, 'COMMA', 0, 'POINT')}">0</span>/night</div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Check-in Date</label>
          <input type="date" id="checkInDate" class="form-control" required onchange="updatePrice()">
        </div>
        <div class="form-group">
          <label>Check-out Date</label>
          <input type="date" id="checkOutDate" class="form-control" required onchange="updatePrice()">
        </div>
      </div>

      <div class="form-group">
        <label>Number of Rooms</label>
        <input type="number" id="roomCount" class="form-control" min="1" value="1" required onchange="updatePrice()">
      </div>

      <div class="form-group">
        <label>Guest Name</label>
        <input type="text" id="guestName" class="form-control" required placeholder="Enter guest name">
      </div>

      <div class="form-group">
        <label>Guest Email</label>
        <input type="email" id="guestEmail" class="form-control" required placeholder="Enter email address">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="guestPhone" class="form-control" placeholder="Enter phone number">
      </div>

      <div class="booking-summary mt-3 p-3" style="background: #f3f4f6; border-radius: 12px;">
        <h6 style="font-weight: 700; margin-bottom: 0.75rem;"><i class="bi bi-receipt"></i> Total: ₹<span id="totalPrice">0</span></h6>
      </div>

      <button type="submit" class="btn-book"><i class="bi bi-calendar-check"></i> Confirm Booking</button>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let selectedRoom = null;

function selectRoom(el) {
  document.querySelectorAll('.room-type-option').forEach(opt => opt.classList.remove('selected'));
  el.classList.add('selected');
  selectedRoom = {
    id: el.dataset.id,
    price: parseFloat(el.dataset.price),
    name: el.dataset.name,
    avail: parseInt(el.dataset.avail) || 999
  };
  updatePrice();
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function updatePrice() {
  if (!selectedRoom) return;
  const checkIn = new Date(document.getElementById('checkInDate').value);
  const checkOut = new Date(document.getElementById('checkOutDate').value);
  const roomCount = parseInt(document.getElementById('roomCount').value) || 1;
  let nights = 0;
  if (checkOut > checkIn) {
    nights = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));
  }
  const total = nights * selectedRoom.price * roomCount;
  document.getElementById('totalPrice').textContent = total.toLocaleString('en-IN');
}

// Set min date to today
document.addEventListener('DOMContentLoaded', function() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('checkInDate').min = today;
  document.getElementById('checkInDate').value = today;
  document.getElementById('checkOutDate').min = today;
  // Auto-select first available room
  const firstRoom = document.querySelector('.room-type-option');
  if (firstRoom) selectRoom(firstRoom);
});

function submitBooking(e) {
  e.preventDefault();
  const errorEl = document.getElementById('errorMessage');
  errorEl.style.display = 'none';

  if (!selectedRoom) {
    errorEl.textContent = 'Please select a room type';
    errorEl.style.display = 'block';
    return false;
  }

  const checkIn = document.getElementById('checkInDate').value;
  const checkOut = document.getElementById('checkOutDate').value;
  const roomCount = parseInt(document.getElementById('roomCount').value) || 1;
  const guestName = document.getElementById('guestName').value;
  const guestEmail = document.getElementById('guestEmail').value;
  const guestPhone = document.getElementById('guestPhone').value;

  if (!checkIn || !checkOut) {
    errorEl.textContent = 'Please select check-in and check-out dates';
    errorEl.style.display = 'block';
    return false;
  }
  if (!guestName || !guestEmail) {
    errorEl.textContent = 'Please fill in guest name and email';
    errorEl.style.display = 'block';
    return false;
  }

  const hotelId = parseInt(document.getElementById('hotelId').value);
  const request = {
    hotelId: hotelId,
    roomTypeId: selectedRoom.id === 'default' ? null : parseInt(selectedRoom.id),
    checkInDate: checkIn,
    checkOutDate: checkOut,
    roomCount: roomCount,
    guestName: guestName,
    guestEmail: guestEmail,
    guestPhone: guestPhone
  };

  fetch('/api/bookings/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(request)
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      errorEl.textContent = data.error;
      errorEl.style.display = 'block';
    } else {
      showToast('Booking confirmed! Reference: ' + (data.bookingReference || 'N/A'), 'success');
      setTimeout(() => { window.location.href = '/hotels'; }, 1500);
    }
  })
  .catch(() => {
    errorEl.textContent = 'Booking failed. Please try again.';
    errorEl.style.display = 'block';
  });

  return false;
}
</script>
</body>
</html>
