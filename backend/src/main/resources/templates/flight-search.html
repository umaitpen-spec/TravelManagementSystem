<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight Search - Roamly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #717171;
      --text-muted: #9ca3af;
      --accent: #1b4965;
      --accent-hover: #0056b3;
      --success: #008009;
      --warning: #e8a800;
      --danger: #c23500;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      background: var(--bg-secondary) !important;
      padding: 0.8rem 2rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar-brand {
      color: var(--accent) !important;
      font-weight: 700;
      font-size: 1.4rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .navbar-brand .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-link-item {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem: 0.5rem 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-link-item:hover, .nav-link-item.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .welcome-text { color: var(--text-secondary); font-size: 0.9rem; }
    .btn-signout {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-signout:hover {
      background: var(--text-primary);
      color: white;
      border-color: var(--text-primary);
    }

    /* Main Container */
    .search-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Hero Search Section */
    .hero-search {
      background: var(--accent);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero-search::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-search h1 {
      color: white;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .hero-search p {
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .search-form {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      background: white;
      padding: 0.75rem;
      border-radius: var(--radius-md);
    }
    .search-input-group {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .search-input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .search-input-group input,
    .search-input-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      background: #fafafa;
      transition: all 0.2s;
    }
    .search-input-group input:focus,
    .search-input-group select:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(27, 73, 101, 0.1);
    }
    .btn-search {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      align-self: flex-end;
    }
    .btn-search:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
    }

    /* Results Header */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .results-count {
      font-size: 1rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .results-count span { font-weight: 700; }

    /* Flights List */
    .flights-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    /* Flight Card */
    .flight-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.25s ease;
    }
    .flight-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
    }
    .flight-img-container {
      position: relative;
      width: 100%;
      height: 140px;
      flex-shrink: 0;
    }
    .flight-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .flight-info {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1rem 1rem 0.5rem;
      flex: 1;
    }
    .flight-airline {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }
    .flight-number {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .flight-route {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .route-city {
      font-weight: 600;
      color: var(--text-primary);
    }
    .route-arrow {
      color: var(--accent);
      font-size: 1rem;
    }
    .flight-timing {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .flight-timing i { color: var(--accent); }
    .stops-badge {
      display: inline-block;
      background: #fafafa;
      color: var(--text-secondary);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .flight-meta {
      padding: 0.5rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      border-top: 1px solid var(--border-color);
      margin-top: auto;
    }
    .flight-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .flight-price .currency { font-size: 0.9rem; }
    .flight-price .per-person {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-muted);
    }
    .flight-class {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .flight-availability {
      font-size: 0.75rem;
      font-weight: 500;
    }
    .avail-ok { color: var(--success); }
    .avail-low { color: var(--warning); }
    .avail-none { color: var(--danger); }

    .btn-book {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }
    .btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
      color: white;
    }
    .btn-book:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .empty-state-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .empty-state-icon i { font-size: 2rem; color: var(--accent); }
    .empty-state h5 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .empty-state p { font-size: 0.9rem; color: var(--text-secondary); }

    /* Loading */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--text-secondary); }

    /* Responsive */
    @media (max-width: 1100px) {
      .flights-list { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .flights-list { grid-template-columns: 1fr; }
      .flight-img-container { height: 180px; }
    }
    @media (max-width: 768px) {
      .navbar { padding: 0.75rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .search-container { padding: 1rem; }
      .hero-search { padding: 1.5rem; }
      .search-form { flex-direction: column; }
      .btn-search { width: 100%; justify-content: center; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a class="navbar-brand" href="/">
      <span class="brand-icon"><i class="bi bi-globe-americas"></i></span>
      Roamly
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link-item">Dashboard</a>
      <a href="/trips/new" class="nav-link-item">Plan a Trip</a>
      <a href="/my-bookings" class="nav-link-item">My Bookings</a>
      <a href="/hotels" class="nav-link-item">Hotels</a>
      <a href="/flights/search" class="nav-link-item active">Flights</a>
      <a href="/expenses" class="nav-link-item">Expenses</a>
    </div>
    <div class="nav-user">
      <span class="welcome-text" th:text="${userName != null} ? ('Welcome, ' + ${userName}) : ''"></span>
      <form method="post" action="/logout" class="mb-0">
        <button type="submit" class="btn-signout">Sign Out</button>
      </form>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="search-container">
    <!-- Hero Search Section -->
    <div class="hero-search">
      <h1>✈️ Find your perfect flight</h1>
      <p>Search and compare flights for your journey</p>
      <div class="search-form">
        <div class="search-input-group">
          <label>From</label>
          <input type="text" id="searchOrigin" placeholder="City or Airport" onkeypress="if(event.key==='Enter') searchFlights()">
        </div>
        <div class="search-input-group">
          <label>To</label>
          <input type="text" id="searchDestination" placeholder="City or Airport" onkeypress="if(event.key==='Enter') searchFlights()">
        </div>
        <div class="search-input-group">
          <label>Date</label>
          <input type="date" id="searchDate" onchange="searchFlights()">
        </div>
        <div class="search-input-group">
          <label>Class</label>
          <select id="classFilter" onchange="searchFlights()">
            <option value="">All Classes</option>
            <option value="ECONOMY">Economy</option>
            <option value="PREMIUM_ECONOMY">Premium Economy</option>
            <option value="BUSINESS">Business</option>
            <option value="FIRST_CLASS">First Class</option>
          </select>
        </div>
        <button class="btn-search" onclick="searchFlights()">
          <i class="bi bi-search"></i> Search
        </button>
      </div>
    </div>

    <!-- Results Header -->
    <div class="results-header">
      <div class="results-count">
        <span id="resultsCount">0</span> flights found
      </div>
    </div>

    <!-- Flights List -->
    <div id="flightsGrid" class="flights-list">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Searching for flights...</p>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentFlights = [];

    function searchFlights() {
      const origin = document.getElementById('searchOrigin').value.trim();
      const destination = document.getElementById('searchDestination').value.trim();
      const date = document.getElementById('searchDate').value;
      let url = '/api/flights/search?';
      if (origin) url += 'source=' + encodeURIComponent(origin) + '&';
      if (destination) url += 'destination=' + encodeURIComponent(destination) + '&';
      if (date) url += 'departureDate=' + date + '&';

      document.getElementById('flightsGrid').innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Searching for flights...</p>
        </div>`;

      fetch(url)
        .then(r => r.json())
        .then(data => { currentFlights = data; displayFlights(data); })
        .catch(e => { console.error(e); displayEmpty(); });
    }

    function displayFlights(flights) {
      const grid = document.getElementById('flightsGrid');
      if (!flights || flights.length === 0) { displayEmpty(); return; }

      const selectedClass = document.getElementById('classFilter').value;
      let filtered = flights;
      if (selectedClass) {
        filtered = flights.filter(f => {
          const classes = f.flightClasses || [];
          return classes.some(c => c.classType === selectedClass);
        });
      }

      if (filtered.length === 0) { displayEmpty('No flights match your criteria.'); return; }

      document.getElementById('resultsCount').textContent = filtered.length;

      grid.innerHTML = filtered.map((f, i) => {
        const classes = f.flightClasses || [];
        const totalAvailable = classes.reduce((sum, c) => sum + (c.availableSeats || 0), 0);
        const availClass = totalAvailable === 0 ? 'avail-none' : totalAvailable < 10 ? 'avail-low' : 'avail-ok';
        const availText = totalAvailable === 0 ? 'Sold Out' : totalAvailable < 10 ? 'Only ' + totalAvailable + ' left!' : totalAvailable + ' seats available';

        const lowestPrice = classes.length > 0 ? Math.min(...classes.map(c => c.price)) : null;
        const price = lowestPrice != null ? '₹' + Number(lowestPrice).toLocaleString('en-IN') : 'N/A';
        const classLabels = classes.map(c => c.classType ? c.classType.replace('_', ' ') : '').filter(Boolean).join(', ');

        const deptTime = f.departureTime ? (f.departureTime.length >= 5 ? f.departureTime.substring(0, 5) : f.departureTime) : '--:--';
        const arrTime = f.arrivalTime ? (f.arrivalTime.length >= 5 ? f.arrivalTime.substring(0, 5) : f.arrivalTime) : '--:--';

        const airlineLogos = {
          'Emirates': '/images/airlines/emirates.jpeg',
          'Qatar Airways': '/images/airlines/Qatar.jpeg',
        };
        const logo = airlineLogos[f.airline] || (f.airlineLogo || f.imageUrl || '');
        return `<div class="flight-card">
          <div class="flight-img-container">
            ${logo ? `<img class="flight-logo" src="${logo}" alt="${f.airline}" onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';">` : ''}
            <div class="flight-icon-fallback" style="display:${logo ? 'none' : 'flex'}; align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg,#0ea5e9,#0284c7);">
              <i class="bi bi-airplane" style="font-size:3rem;color:white;transform:rotate(-45deg);"></i>
            </div>
          </div>
          <div class="flight-info">
            <div class="flight-airline">${f.airline}</div>
            <div class="flight-number">${f.flightNumber || ''}</div>
            <div class="flight-route">
              <span class="route-city">${f.sourceCity || f.origin}</span>
              <i class="bi bi-arrow-right route-arrow"></i>
              <span class="route-city">${f.destinationCity || f.destination}</span>
            </div>
            <div class="flight-timing">
              <i class="bi bi-clock"></i>
              ${deptTime} - ${arrTime} &bull; ${f.duration || 'N/A'}
            </div>
          </div>
          <div class="flight-meta">
            <div class="flight-price"><span class="currency">₹</span>${Number(lowestPrice||0).toLocaleString('en-IN')} <span class="per-person">/person</span></div>
            <div class="flight-class">${classLabels || 'Economy'}</div>
            <div class="flight-availability ${availClass}">${availText}</div>
            <a class="btn-book" ${totalAvailable === 0 ? 'disabled' : ''} href="/book-flight/${f.id}">${totalAvailable === 0 ? 'Sold Out' : 'Book Now'}</a>
          </div>
        </div>`;
      }).join('');
    }

    function displayEmpty(msg) {
      document.getElementById('resultsCount').textContent = '0';
      document.getElementById('flightsGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">
            <i class="bi bi-airplane"></i>
          </div>
          <h5>✈️ ${msg || 'No flights found'}</h5>
          <p>${msg ? 'Try adjusting your search or filters.' : 'Enter your origin and destination to search for flights.'}</p>
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', function() { searchFlights(); });
  </script>
</body>
</html>
