<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymele.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${hotel != null ? 'Edit Hotel' : 'Add Hotel'} + ' - Roamly'">Hotel Management - Roamly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #717171;
      --text-muted: #9ca3af;
      --accent: #1b4965;
      --accent-hover: #0056b3;
      --success: #008009;
      --warning: #e8a800;
      --danger: #c23500;
      --border-color: #e0e0e0;
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --primary-solid: #1b4965;
      --primary-gradient: linear-gradient(135deg, #0ea5e9, #8b5cf6);
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      margin: 0;
    }
    .navbar {
      background: var(--bg-secondary) !important;
      padding: 0.8rem 2rem;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.4rem; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .navbar-brand span { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-back {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-back:hover { background: var(--text-primary); border-color: var(--text-primary); color: white; }
    .main-content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .page-header {
      background: var(--accent);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .page-header h2 { margin: 0; font-weight: 700; position: relative; z-index: 1; }
    .page-header p { margin: 0.5rem 0 0; opacity: 0.9; position: relative; z-index: 1; }
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 2rem;
    }
    .form-card h5 {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-card h5 i { color: var(--accent); }
    .form-group label { font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
    .form-control {
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      border: 1px solid var(--border-color);
      background: #fafafa;
      font-size: 0.95rem;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(27, 73, 101, 0.1); }
    .btn-save {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4); color: white; }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.75rem 2rem;
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: var(--text-primary); color: white; border-color: var(--text-primary); }
    /* Room Types Section */
    .room-type-card {
      background: #fafafa;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .room-type-card:hover { border-color: var(--accent); transform: translateX(4px); }
    .room-type-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .room-type-name { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
    .room-type-price { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .room-type-details { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .room-type-detail { display: flex; align-items: center; gap: 0.35rem; color: var(--text-secondary); font-size: 0.9rem; }
    .room-type-detail i { color: var(--accent); }
    .room-type-features { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }
    .btn-room-edit {
      background: white;
      border: 1px solid var(--border-color);
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-room-edit:hover { border-color: var(--accent); color: var(--accent); }
    .btn-room-delete {
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      color: var(--danger);
      transition: all 0.2s;
    }
    .btn-room-delete:hover { background: #fee2e2; }
    .add-room-card {
      background: white;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-room-card:hover { border-color: var(--accent); background: #fafafa; }
    .add-room-card i { font-size: 2rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .add-room-card p { margin: 0; color: var(--text-secondary); font-weight: 500; }
    /* Modal Styles */
    .modal-header { background: var(--accent); color: white; }
    .modal-header .close { color: white; opacity: 0.8; }
    .modal-header .close:hover { opacity: 1; }
    .btn-add-room {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-add-room:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4); color: white; }
    .amenities-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .amenity-tag {
      background: #e0f2fe;
      color: #0284c7;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .badge-ac { background: #d1fae5; color: #065f46; }
    .badge-nonac { background: #fef3c7; color: #92400e; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { padding: 1rem 1.5rem; border-radius: var(--radius-md); margin-bottom: 0.75rem; color: white; font-weight: 500; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 0.75rem; }
    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">🌍 Roamly</a>
  <div class="ml-auto">
    <a href="/provider/dashboard" class="btn btn-back"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
  </div>
</nav>

<div id="toastContainer" class="toast-container"></div>

<div class="main-content">
  <div class="page-header">
    <h2><i class="bi bi-building"></i> <span th:text="${hotel != null ? 'Edit Hotel' : 'Add New Hotel'}">Add New Hotel</span></h2>
    <p th:text="${hotel != null ? 'Update hotel information and manage room types' : 'Enter hotel details and add room types'}"></p>
  </div>

  <form id="hotelForm">
    <input type="hidden" name="id" th:value="${hotel?.id}">

    <div class="form-card">
      <h5><i class="bi bi-info-circle"></i> Basic Information</h5>
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Hotel Name *</label>
            <input type="text" name="name" class="form-control" required th:value="${hotel?.name}">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Location *</label>
            <input type="text" name="location" class="form-control" required th:value="${hotel?.location}">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" class="form-control" th:value="${hotel?.address}">
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label>Base Price/Night (₹) *</label>
            <input type="number" name="pricePerNight" class="form-control" step="0.01" required th:value="${hotel?.pricePerNight}">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Rating (1-5)</label>
            <input type="number" name="rating" class="form-control" step="0.1" min="1" max="5" th:value="${hotel?.rating}">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label>Image URL</label>
            <input type="text" name="imageUrl" class="form-control" th:value="${hotel?.imageUrl}">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Amenities</label>
        <input type="text" name="amenities" class="form-control" placeholder="WiFi, Pool, Gym, Restaurant..." th:value="${hotel?.amenities}">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="form-control" rows="3" th:text="${hotel?.description}"></textarea>
      </div>
    </div>

    <div class="d-flex gap-3 justify-content-end mb-3">
      <a href="/provider/dashboard" class="btn btn-cancel">Cancel</a>
      <button type="button" class="btn btn-save" onclick="saveHotel()">
        <i class="bi bi-check-circle"></i> <span th:text="${hotel != null ? 'Update Hotel' : 'Save Hotel'}">Save Hotel</span>
      </button>
    </div>

    <div class="form-card">
      <h5><i class="bi bi-door-open"></i> Room Types</h5>
      <p class="text-muted mb-3">Add different room categories with their prices and availability.</p>

      <div id="roomTypesList">
        <div th:each="rt : ${hotel?.roomTypes}" class="room-type-card"
          th:attr="data-room-id=${rt.id},
                   data-room-name=${rt.name},
                   data-room-price=${rt.pricePerNight},
                   data-room-capacity=${rt.capacity},
                   data-room-count=${rt.availableCount},
                   data-room-ac=${rt.ac},
                   data-room-features=${rt.features != null ? rt.features : ''},
                   data-room-image=${rt.imageUrl != null ? rt.imageUrl : ''}">
          <div class="room-type-header">
            <span class="room-type-name" th:text="${rt.name}">Deluxe Room</span>
            <div class="d-flex align-items-center gap-2">
              <span class="room-type-price">₹<span th:text="${#numbers.formatDecimal(rt.pricePerNight, 1, 2)}">0</span><span class="small text-muted">/night</span></span>
              <button type="button" class="btn btn-room-edit" th:attr="onclick=|editRoomType(${rt.id})|"><i class="bi bi-pencil"></i> Edit</button>
              <button type="button" class="btn btn-room-delete" th:attr="onclick=|deleteRoomType(${rt.id})|"><i class="bi bi-trash"></i> Delete</button>
            </div>
          </div>
          <div class="room-type-details">
            <span class="room-type-detail"><i class="bi bi-people"></i> <span th:text="${rt.capacity}">2</span> Guests</span>
            <span class="room-type-detail"><i class="bi bi-door-closed"></i> <span th:text="${rt.availableCount}">5</span> Rooms</span>
            <span class="room-type-detail">
              <i class="bi bi-snow"></i> <span th:text="${rt.ac ? 'AC' : 'Non-AC'}">AC</span>
            </span>
          </div>
          <div class="room-type-features" th:if="${rt.features != null}" th:text="${rt.features}"></div>
        </div>
      </div>

      <div class="add-room-card" data-toggle="modal" data-target="#roomTypeModal" onclick="openAddRoomType()">
        <i class="bi bi-plus-circle"></i>
        <p>Add Room Type</p>
      </div>
    </div>
  </form>
</div>

<!-- Room Type Modal -->
<div class="modal fade" id="roomTypeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-white"><i class="bi bi-door-open"></i> <span id="roomModalTitle">Add Room Type</span></h5>
        <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="roomTypeForm">
          <input type="hidden" name="id" id="roomTypeId">
          <input type="hidden" name="hotelId" id="roomHotelId" th:value="${hotel?.id}">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Room Type Name *</label>
                <input type="text" name="name" id="roomTypeName" class="form-control" required placeholder="e.g., Deluxe, Suite, Premium">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Price/Night (₹) *</label>
                <input type="number" name="pricePerNight" id="roomTypePrice" class="form-control" step="0.01" required>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Capacity (Guests) *</label>
                <input type="number" name="capacity" id="roomTypeCapacity" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Available Rooms *</label>
                <input type="number" name="availableCount" id="roomTypeCount" class="form-control" required>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>AC / Non-AC</label>
            <select name="ac" id="roomTypeAC" class="form-control" style="height: 45px;">
              <option value="true">AC</option>
              <option value="false">Non-AC</option>
            </select>
          </div>
        <div class="form-group">
          <label>Features</label>
            <textarea name="features" id="roomTypeFeatures" class="form-control" rows="2" placeholder="King Bed, Ocean View, Mini Bar..."></textarea>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="text" name="imageUrl" id="roomTypeImage" class="form-control" placeholder="https://...">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-add-room" onclick="saveRoomType()">Save Room Type</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<input type="hidden" id="hotelIdField" th:value="${hotel?.id}">
<script th:inline="javascript">
const hotelId = (document.getElementById('hotelIdField').value || '').trim();

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

function saveHotel() {
  const form = document.getElementById('hotelForm');
  const fd = new FormData(form);
  const data = Object.fromEntries(fd);
  const method = hotelId ? 'PUT' : 'POST';
  const url = hotelId ? '/provider/hotels/' + hotelId : '/provider/hotels';
  fetch(url, { method, headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(data) })
    .then(r => { if (!r.ok) throw new Error('Save failed'); return r.json(); })
    .then(d => {
      if (!hotelId) {
        window.location.href = '/provider/hotels/' + d.id + '/edit';
      } else {
        window.location.href = '/provider/dashboard';
      }
    }).catch(e => { console.error(e); showToast('Failed to save hotel', 'error'); });
}

function openAddRoomType() {
  document.getElementById('roomModalTitle').textContent = 'Add Room Type';
  document.getElementById('roomTypeId').value = '';
  document.getElementById('roomTypeName').value = '';
  document.getElementById('roomTypePrice').value = '';
  document.getElementById('roomTypeCapacity').value = '';
  document.getElementById('roomTypeCount').value = '';
  document.getElementById('roomTypeAC').value = 'true';
  document.getElementById('roomTypeFeatures').value = '';
  document.getElementById('roomTypeImage').value = '';
  $('#roomTypeModal').modal('show');
}

function editRoomType(id) {
  const card = document.querySelector('.room-type-card[data-room-id="' + id + '"]');
  if (!card) { showToast('Room type not found', 'error'); return; }
  document.getElementById('roomModalTitle').textContent = 'Edit Room Type';
  document.getElementById('roomTypeId').value = id;
  document.getElementById('roomTypeName').value = card.dataset.roomName || '';
  document.getElementById('roomTypePrice').value = card.dataset.roomPrice || '';
  document.getElementById('roomTypeCapacity').value = card.dataset.roomCapacity || '';
  document.getElementById('roomTypeCount').value = card.dataset.roomCount || '';
  document.getElementById('roomTypeAC').value = card.dataset.roomAc === 'true' ? 'true' : 'false';
  document.getElementById('roomTypeFeatures').value = card.dataset.roomFeatures || '';
  document.getElementById('roomTypeImage').value = card.dataset.roomImage || '';
  $('#roomTypeModal').modal('show');
}

function saveRoomType() {
  if (!hotelId) {
    showToast('Please save the hotel first before adding room types', 'info');
    return;
  }
  const form = document.getElementById('roomTypeForm');
  const fd = new FormData(form);
  const data = Object.fromEntries(fd);
  data.ac = data.ac === 'true';
  data.capacity = parseInt(data.capacity);
  data.availableCount = parseInt(data.availableCount);
  data.pricePerNight = parseFloat(data.pricePerNight);
  const id = (data.id || '').trim();
  const method = id ? 'PUT' : 'POST';
  const url = id ? '/provider/hotels/' + hotelId + '/room-types/' + id : '/provider/hotels/' + hotelId + '/room-types';
  console.log('Saving room type:', method, url, data);
  fetch(url, { method, headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify(data) })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ': Save failed'); return r.json(); })
    .then(d => { $('#roomTypeModal').modal('hide'); window.location.reload(); })
    .catch(e => { console.error(e); showToast('Failed to save room type', 'error'); });
}

function deleteRoomType(id) {
  if (!confirm('Delete this room type?')) return;
  fetch('/provider/hotels/' + hotelId + '/room-types/' + id, { method: 'DELETE', credentials: 'include' })
    .then(r => window.location.reload());
}
</script>
</body>
</html>
