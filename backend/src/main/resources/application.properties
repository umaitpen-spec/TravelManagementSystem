# Default development datasource uses in-memory H2.
# To use MySQL instead, run with --spring.profiles.active=mysql
spring.datasource.url=jdbc:h2:mem:travel_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
server.port=8080
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
logging.level.org.springframework.security.oauth2.client.web.OAuth2AuthorizationRequestRedirectFilter=TRACE
logging.level.org.springframework.security.oauth2.client.web.OAuth2LoginAuthenticationFilter=TRACE
logging.level.org.springframework.security.web.access.ExceptionTranslationFilter=TRACE
logging.level.org.springframework.security.web.access.intercept.FilterSecurityInterceptor=TRACE
logging.level.org.springframework.security.oauth2.core=TRACE

# OpenRouter AI itinerary generation.
# Set OPENROUTER_API_KEY in your environment; do not commit API keys.
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=${OPENROUTER_MODEL:meta-llama/llama-3.1-8b-instruct}
openrouter.max-plans-per-trip=${OPENROUTER_MAX_PLANS_PER_TRIP:3}

openrouter.site.url=${OPENROUTER_SITE_URL:http://localhost:8080}
openrouter.app.name=${OPENROUTER_APP_NAME:Roamly}

# HTTP timeouts (ms)
# read timeout controls overall "max-time" behavior in this app
openrouter.http.connect-timeout-ms=${OPENROUTER_HTTP_CONNECT_TIMEOUT_MS:10000}
openrouter.http.read-timeout-ms=${OPENROUTER_HTTP_READ_TIMEOUT_MS:60000}

# Google OAuth
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

